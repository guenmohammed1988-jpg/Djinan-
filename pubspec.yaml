name: DJINAN
description: A Flutter application with splash screen and Firebase authentication.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_auth: ^4.15.3
  firebase_core: ^2.24.2
  cloud_firestore: ^4.13.6
  google_fonts: ^6.1.0
  video_player: ^2.8.1
  cached_network_image: ^3.3.0
  geolocator: ^10.1.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0
  crypto: ^3.0.3
  image_picker: ^1.0.4
  shared_preferences: ^2.2.2
  firebase_storage: ^11.5.6
  video_compress: ^3.1.2
  http: ^1.1.2
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  geoflutterfire2: ^2.3.2
  google_maps_flutter: ^2.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  encrypt: ^5.0.1
  flutter_secure_storage: ^9.0.0
  file_picker: ^6.1.1
  url_launcher: ^6.2.2
  intl: ^0.18.1
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/